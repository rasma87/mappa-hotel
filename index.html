<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Art Hotel – Guest Guide</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>


<div id="panel">
    <div id="panel-header">
        <img src="img/logo-hotel.png" alt="Soul Art Hotel" class="hotel-logo-img">
        <p id="hdr-subtitle">Guest Guide</p>
    </div>
    <div id="lang-switcher">
        <button class="lang-btn" data-lang="it">IT</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>
    <div id="panel-tabs">
        <button class="panel-tab active" id="tab-places" onclick="switchTab('places')"><span id="tab-places-label">🗺 Places</span></button>
        <button class="panel-tab" id="tab-transit" onclick="switchTab('transit')"><span id="tab-transit-label">🚇 Transport</span></button>
        <button class="panel-tab" id="tab-hotel" onclick="switchTab('hotel')"><span id="tab-hotel-label">🏨 Hotel</span></button>
    </div>

    <div id="panel-tab-places">
        <div id="filters">
            <button class="filter-btn active" data-cat="all" id="f-all">All</button>
            <button class="filter-btn" data-cat="monument" id="f-monument">Monuments</button>
            <button class="filter-btn" data-cat="museum" id="f-museum">Museums</button>
            <button class="filter-btn" data-cat="transport" id="f-transport">Transport</button>
            <button class="filter-btn" data-cat="nature" id="f-nature">Viewpoints</button>
        </div>
        <div id="poi-list"></div>
    </div>

    <div id="panel-tab-hotel"></div>
    <div id="panel-tab-transit" class="transit-scroll">
        <!-- Content injected by JS for multilingual support -->
    </div>
</div>

<div id="mobile-header">
    <div>Soul Art Hotel <span id="mob-subtitle">Guest Guide</span></div>
</div>
<div id="mobile-lang">
    <button class="lang-btn" data-lang="it">IT</button>
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="es">ES</button>
</div>

<div id="mobile-tabs">
    <button class="mob-tab active" id="mob-tab-map" onclick="mobileTab('map')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        <span id="mobt-map">Map</span>
    </button>
    <button class="mob-tab" id="mob-tab-places" onclick="mobileTab('places')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span id="mobt-places">Places</span>
    </button>
    <button class="mob-tab" id="mob-tab-transit" onclick="mobileTab('transit')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="13" rx="2"/><path d="M8 13v4m8-4v4M6 17h12"/><circle cx="8.5" cy="9.5" r="1"/><circle cx="15.5" cy="9.5" r="1"/></svg>
        <span id="mobt-transit">Transport</span>
    </button>
    <button class="mob-tab" id="mob-tab-hotel" onclick="mobileTab('hotel')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span id="mobt-hotel">Hotel</span>
    </button>
</div>

<div id="mobile-panel">
    <div id="mobile-panel-inner"></div>
</div>

<div id="map"></div>

<div id="detail-card">
    <div id="detail-drag"></div>
    <button id="detail-close">&#x2715;</button>
    <div id="detail-img-wrap">
        <img id="detail-img" src="" alt="">
        <div id="detail-img-overlay"></div>
    </div>
    <div id="detail-content">
        <div id="detail-category"></div>
        <div id="detail-name"></div>
        <div id="detail-desc"></div>
        <div class="detail-meta" id="detail-meta"></div>
        <div id="detail-ticket"></div>
        <a id="detail-directions" href="#" target="_blank">&#x1F9ED; <span id="dir-label">Directions</span></a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
