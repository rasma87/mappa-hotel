<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Art Hotel – Guest Guide</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E2E2E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Soul Art">
    <link rel="apple-touch-icon" href="img/logo-hotel.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold:#C9A84C; --gold-light:#E8D5A3; --dark:#1A1A1A; --charcoal:#2D2D2D; --cream:#F9F5EE; --white:#FFFFFF; --text-muted:#888; --panel-w:360px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; background:var(--cream); height:100vh; overflow:hidden; display:flex; }
        #panel { width:var(--panel-w); min-width:var(--panel-w); height:100vh; background:var(--cream); display:flex; flex-direction:column; z-index:900; overflow:hidden; box-shadow:4px 0 30px rgba(0,0,0,0.3); }
        #panel-header { background:var(--dark); padding:20px 20px 14px; text-align:center; flex-shrink:0; }
        #panel-header::after { content:""; display:block; width:40px; height:2px; background:var(--gold); margin:10px auto 0; }
        .hotel-logo-img { width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; display:block; margin:0 auto 8px; }
        #panel-header h1 { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-weight:300; font-size:1.2rem; color:var(--white); letter-spacing:3px; text-transform:uppercase; }
        #panel-header p { font-size:0.62rem; color:var(--gold-light); letter-spacing:4px; text-transform:uppercase; margin-top:3px; }

        /* LANGUAGE SWITCHER */
        #lang-switcher { display:flex; justify-content:center; gap:6px; padding:10px 16px 8px; background:var(--dark); flex-shrink:0; }
        .lang-btn { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:0.6rem; font-weight:500; letter-spacing:1px; text-transform:uppercase; border:1px solid #444; background:transparent; color:#888; padding:4px 10px; border-radius:20px; cursor:pointer; transition:all 0.2s; }
        .lang-btn.active { background:var(--gold); border-color:var(--gold); color:var(--white); }
        .lang-btn:hover:not(.active) { border-color:#777; color:#ccc; }

        #filters { padding:12px 16px 10px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid #E0D8CC; flex-shrink:0; background:var(--cream); }
        .filter-btn { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:0.62rem; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; border:1px solid #C8BFA8; background:transparent; color:var(--text-muted); padding:5px 10px; border-radius:20px; cursor:pointer; transition:all 0.2s; }
        .filter-btn.active,.filter-btn:hover { background:var(--gold); border-color:var(--gold); color:var(--white); }

        /* PANEL TABS */
        #panel-tabs { display:flex; flex-shrink:0; border-bottom:2px solid #E0D8CC; background:var(--cream); }
        .panel-tab { flex:1; padding:10px 0; font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:0.62rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; text-align:center; cursor:pointer; color:var(--text-muted); border:none; background:transparent; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
        .panel-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
        #panel-tab-places { display:flex; flex-direction:column; flex:1; overflow:hidden; }
        #panel-tab-transit { display:none; flex:1; overflow-y:auto; padding:16px 14px 20px; }
        #panel-tab-transit::-webkit-scrollbar { width:3px; }
        #panel-tab-transit::-webkit-scrollbar-thumb { background:var(--gold-light); }
        #panel-tab-hotel { display:none; flex:1; overflow-y:auto; padding:16px 14px 24px; }
        #panel-tab-hotel::-webkit-scrollbar { width:3px; }
        #panel-tab-hotel::-webkit-scrollbar-thumb { background:var(--gold-light); }
        .hotel-info-section { margin-bottom:18px; }
        .hotel-info-title { font-size:0.58rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #E8DFC8; }
        .hotel-info-card { background:white; border-radius:12px; padding:14px 16px; border:1px solid #EDE6D8; margin-bottom:10px; }
        .hotel-info-row { display:flex; align-items:center; gap:12px; }
        .hotel-info-icon { font-size:1.4rem; flex-shrink:0; width:36px; text-align:center; }
        .hotel-info-text h4 { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:1rem; font-weight:400; color:var(--dark); margin-bottom:2px; }
        .hotel-info-text p { font-size:0.75rem; color:#666; line-height:1.5; }
        .hotel-code-box { background:var(--dark); border-radius:12px; padding:16px; text-align:center; margin-bottom:10px; }
        .hotel-code-label { font-size:0.58rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold-light); margin-bottom:8px; }
        .hotel-code-value { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:2.2rem; font-weight:400; color:var(--gold); letter-spacing:6px; }
        .hotel-code-sub { font-size:0.65rem; color:#888; margin-top:6px; }
        .hotel-contact-btn { display:flex; align-items:center; gap:12px; background:white; border-radius:12px; padding:13px 16px; border:1px solid #EDE6D8; margin-bottom:8px; text-decoration:none; transition:all 0.2s; cursor:pointer; width:100%; }
        .hotel-contact-btn:hover { border-color:var(--gold); background:#FFFDF7; }
        .hotel-contact-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
        .hotel-contact-icon.phone { background:#E8F4FD; }
        .hotel-contact-icon.whatsapp { background:#E8F8E8; }
        .hotel-contact-text { flex:1; }
        .hotel-contact-text span { font-size:0.58rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:2px; }
        .hotel-contact-text strong { font-size:0.9rem; color:var(--dark); }
        .hotel-contact-arrow { color:#CCC; font-size:0.8rem; }
        .hotel-badge { display:inline-flex; align-items:center; gap:6px; background:#F0FAF0; border:1px solid #C8E6C9; border-radius:20px; padding:5px 12px; font-size:0.7rem; color:#2E7D32; font-weight:500; }

        /* TRANSIT INFOGRAPHIC */
        .transit-section { margin-bottom:20px; }
        .transit-section-title { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:1.1rem; font-weight:400; color:var(--dark); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
        .transit-badge { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:6px; font-size:0.7rem; font-weight:400; color:white; flex-shrink:0; }
        .transit-line { background:var(--cream); border:1px solid #E0D8CC; border-radius:12px; padding:12px 14px; margin-bottom:8px; }
        .transit-line-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .transit-line-name { font-size:0.78rem; font-weight:500; color:var(--dark); }
        .transit-line-sub { font-size:0.65rem; color:var(--text-muted); margin-top:1px; }
        .transit-hours { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
        .transit-hour-item { background:white; border-radius:8px; padding:7px 10px; }
        .transit-hour-label { font-size:0.55rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:2px; }
        .transit-hour-value { font-size:0.8rem; font-weight:500; color:var(--dark); }
        .transit-freq { margin-top:6px; font-size:0.68rem; color:#666; display:flex; align-items:center; gap:5px; }
        .transit-freq::before { content:""; display:block; width:6px; height:6px; border-radius:50%; background:var(--gold); flex-shrink:0; }
        .transit-tip { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); border-radius:10px; padding:10px 12px; margin-top:14px; font-size:0.72rem; color:#6B5B2E; line-height:1.55; }
        .transit-tip strong { display:block; font-size:0.6rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
        .transit-divider { height:1px; background:#E0D8CC; margin:16px 0; }
        #poi-list { flex:1; overflow-y:auto; padding:8px 0; }
        #poi-list::-webkit-scrollbar { width:3px; }
        #poi-list::-webkit-scrollbar-thumb { background:var(--gold-light); border-radius:2px; }
        .poi-item { padding:12px 18px; cursor:pointer; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(0,0,0,0.05); transition:background 0.15s; }
        .poi-item:hover { background:rgba(201,168,76,0.08); }
        .poi-item.active { background:rgba(201,168,76,0.14); }
        .poi-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .poi-info h3 { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:1rem; font-weight:400; color:var(--dark); line-height:1.2; }
        .poi-info span { font-size:0.65rem; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }
        #map { flex:1; height:100vh; }
        #detail-card { position:absolute; bottom:0; left:var(--panel-w); right:0; background:var(--white); border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,0.2); z-index:800; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.32,0.72,0,1); max-height:70vh; display:flex; flex-direction:column; overflow:hidden; }
        #detail-card.open { transform:translateY(0); }
        #detail-drag { width:40px; height:4px; background:#DDD; border-radius:2px; margin:12px auto 0; flex-shrink:0; }
        #detail-close { position:absolute; top:14px; right:18px; width:28px; height:28px; border-radius:50%; border:1px solid #EEE; background:white; cursor:pointer; font-size:14px; color:#999; display:flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:1; }
        #detail-close:hover { background:var(--dark); color:white; border-color:var(--dark); }
        #detail-img-wrap { position:relative; width:100%; height:190px; overflow:hidden; flex-shrink:0; background:#E8E0D4; }
        #detail-img { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity 0.5s ease; }
        #detail-img.loaded { opacity:1; }
        #detail-img-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,transparent 40%,rgba(255,255,255,0.97) 100%); pointer-events:none; }
        #detail-img-placeholder { display:none; }
        #detail-content { padding:14px 24px 28px; overflow-y:auto; flex:1; }
        #detail-content::-webkit-scrollbar { width:3px; }
        #detail-content::-webkit-scrollbar-thumb { background:#EEE; }
        #detail-category { font-size:0.62rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:5px; }
        #detail-name { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:1.8rem; font-weight:400; color:var(--dark); line-height:1.1; margin-bottom:12px; }
        #detail-desc { font-size:0.85rem; color:#555; line-height:1.75; margin-bottom:16px; }
        .detail-meta { display:flex; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
        .meta-item { display:flex; align-items:flex-start; gap:7px; }
        .meta-icon { font-size:13px; margin-top:1px; color:var(--gold); flex-shrink:0; }
        .meta-label { font-size:0.6rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); display:block; }
        .meta-value { font-size:0.8rem; color:var(--dark); font-weight:500; }
        .ticket-box { background:#F9F5EE; border:1px solid #E8DFC8; border-radius:12px; padding:14px 16px; margin-bottom:18px; }
        .ticket-box-title { font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:10px; }
        .ticket-section { display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; margin-bottom:8px; }
        .ticket-col-label { font-size:0.58rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px; }
        .ticket-row { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #EDE6D8; font-size:0.76rem; }
        .ticket-row:last-child { border-bottom:none; }
        .ticket-row-label { color:#555; }
        .ticket-row-value { font-weight:500; color:var(--dark); }
        .ticket-row-value.free { color:#4A8C6F; }
        .ticket-note { font-size:0.7rem; color:#888; line-height:1.5; padding-top:8px; border-top:1px solid #EDE6D8; font-style:italic; }
        #detail-directions { display:inline-flex; align-items:center; gap:8px; background:var(--dark); color:white; padding:11px 20px; border-radius:50px; font-size:0.72rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; text-decoration:none; transition:background 0.2s; }
        #detail-directions:hover { background:var(--gold); }
        .custom-marker { width:32px; height:32px; border-radius:50%; border:2.5px solid white; display:flex; align-items:center; justify-content:center; font-size:13px; box-shadow:0 3px 12px rgba(0,0,0,0.3); cursor:pointer; }
        .hotel-marker-wrap { width:44px; height:44px; border-radius:50%; border:3px solid var(--gold); overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,0.4); }
        .hotel-marker-wrap img { width:100%; height:100%; object-fit:cover; }
        .leaflet-popup-content-wrapper { border-radius:10px !important; font-family:Helvetica Neue,Helvetica,Arial,sans-serif !important; }
        @media (max-width:680px) {
            :root { --panel-w:0px; }
            body { height:100dvh; overflow:hidden; }
            #panel { display:none; }
            #detail-card { left:0; }
            #mobile-header { display:flex !important; }
            #mobile-lang { display:flex !important; }
            #mobile-tabs { display:flex !important; }
            #map { height:calc(100vh - 56px); height:calc(100dvh - 56px); margin-bottom:56px; }
            #detail-img-wrap { height:150px; }
            #detail-content { padding:12px 18px 90px; }
            #detail-name { font-size:1.4rem; }
            #mobile-panel { -webkit-overflow-scrolling:touch; }
            .filter-btn, .lang-btn, .mob-tab, button { touch-action:manipulation; }
        }
        #mobile-header { display:none; position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:900; background:rgba(26,26,26,0.9); padding:8px 18px; border-radius:50px; align-items:center; gap:8px; color:white; font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:0.95rem; letter-spacing:2px; backdrop-filter:blur(8px); }
        #mobile-header span { color:var(--gold); font-size:0.6rem; font-family:Helvetica Neue,Helvetica,Arial,sans-serif; letter-spacing:3px; text-transform:uppercase; }
        #mobile-lang { display:none; position:absolute; top:60px; right:14px; z-index:900; gap:5px; }
        #mobile-lang .lang-btn { background:rgba(26,26,26,0.88); border-color:#555; color:#ccc; backdrop-filter:blur(8px); }
        #mobile-lang .lang-btn.active { background:var(--gold); border-color:var(--gold); color:white; }

        /* MOBILE TAB BAR */
        #mobile-tabs { display:none; position:fixed; bottom:0; left:0; right:0; z-index:950; background:var(--dark); border-top:1px solid #333; height:56px; align-items:stretch; }
        .mob-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; border:none; background:transparent; color:#777; transition:color 0.2s; padding:0; }
        .mob-tab.active { color:var(--gold); }
        .mob-tab svg { width:20px; height:20px; }
        .mob-tab span { font-family:Helvetica Neue,Helvetica,Arial,sans-serif; font-size:0.55rem; letter-spacing:1px; text-transform:uppercase; }

        /* MOBILE OVERLAY PANELS */
        #mobile-panel { display:block; position:fixed; bottom:56px; left:0; right:0; height:calc(100vh - 56px); height:calc(100dvh - 56px); z-index:940; background:var(--cream); overflow-y:auto; transform:translateY(110%); transition:transform 0.35s ease; pointer-events:none; }
        #mobile-panel.open { transform:translateY(0); pointer-events:auto; }
        #mobile-panel-inner { padding:12px 14px 80px; }

        /* ── TEMA PANNELLO BIANCO / SCALE DI GRIGI ─────────────────────────── */
        :root {
            --pb:  #FFFFFF;   /* panel background - bianco   */
            --ps:  #F4F4F4;   /* panel surface (card)        */
            --ps2: #EBEBEB;   /* panel surface 2             */
            --pb2: #DEDEDE;   /* panel border                */
            --pt:  #1A1A1A;   /* panel text - quasi nero     */
            --pm:  #777777;   /* panel muted                 */
            --pa:  #2E2E2E;   /* panel accent - grigio scuro */
        }

        /* Sfondo pannello */
        #panel                          { background: var(--pb); }
        #filters                        { background: var(--pb); border-bottom-color: var(--pb2); }
        #panel-tabs                     { background: var(--pb); border-bottom-color: var(--pb2); }
        #panel-tab-transit              { background: var(--pb); }
        #panel-tab-hotel                { background: var(--pb); }

        /* Header: logo orizzontale SoulArt, solo "Guest Guide" sotto */
        #panel-header                   { background: #FFFFFF; border-bottom: 1px solid var(--pb2); padding: 32px 28px 24px; }
        #panel-header::after            { display: none; }
        #panel-header p                 { color: var(--pm); font-size: 0.65rem; letter-spacing: 4px; margin-top: 14px; }
        .hotel-logo-img                 { width: 200px; height: auto; border-radius: 0; border: none; margin: 0 auto; }

        /* Lang switcher */
        #lang-switcher                  { background: #F0F0F0; border-bottom: 1px solid var(--pb2); }
        .lang-btn                       { border-color: #CCCCCC; color: var(--pm); }
        .lang-btn.active                { background: var(--pa); border-color: var(--pa); color: #FFF; }
        .lang-btn:hover:not(.active)    { border-color: #999; color: var(--pt); }

        /* Filter buttons */
        .filter-btn                     { border-color: #CCCCCC; color: var(--pm); }
        .filter-btn.active,
        .filter-btn:hover               { background: var(--pa); border-color: var(--pa); color: #FFF; }

        /* Tab labels */
        .panel-tab                      { color: var(--pm); }
        .panel-tab.active               { color: var(--pa); border-bottom-color: var(--pa); }

        /* POI list */
        .poi-item                       { border-bottom-color: rgba(0,0,0,0.06); }
        .poi-item:hover                 { background: rgba(0,0,0,0.04); }
        .poi-item.active                { background: rgba(0,0,0,0.08); }
        .poi-info h3                    { color: var(--pt); }
        .poi-info span                  { color: var(--pm); }
        #poi-list::-webkit-scrollbar-thumb,
        #panel-tab-transit::-webkit-scrollbar-thumb,
        #panel-tab-hotel::-webkit-scrollbar-thumb { background: #CCCCCC; }

        /* Hotel info tab */
        .hotel-info-title               { color: var(--pa); border-bottom-color: var(--pb2); }
        .hotel-info-card                { background: var(--ps); border-color: var(--pb2); }
        .hotel-info-text h4             { color: var(--pt); }
        .hotel-info-text p              { color: var(--pm); }
        .hotel-code-box                 { background: var(--pa); }
        .hotel-code-label               { color: #AAAAAA; }
        .hotel-code-value               { color: #FFFFFF; }
        .hotel-code-sub                 { color: #AAAAAA; }
        .hotel-contact-btn              { background: var(--pb); border-color: var(--pb2); }
        .hotel-contact-btn:hover        { background: var(--ps); border-color: #AAAAAA; }
        .hotel-contact-text span        { color: var(--pm); }
        .hotel-contact-text strong      { color: var(--pt); }
        .hotel-contact-arrow            { color: #BBBBBB; }
        .hotel-badge                    { background: #EFEFEF; border-color: #CCCCCC; color: #555; }

        /* Transit tab */
        .transit-section-title          { color: var(--pt); }
        .transit-line                   { background: var(--ps); border-color: var(--pb2); }
        .transit-line-name              { color: var(--pt); }
        .transit-line-sub               { color: var(--pm); }
        .transit-hour-item              { background: var(--pb); border: 1px solid var(--pb2); }
        .transit-hour-label             { color: var(--pm); }
        .transit-hour-value             { color: var(--pt); }
        .transit-freq                   { color: var(--pm); }
        .transit-freq::before           { background: var(--pa); }
        .transit-tip                    { background: #F4F4F4; border-color: #CCCCCC; color: #555; }
        .transit-tip strong             { color: var(--pa); }
        .transit-divider                { background: var(--pb2); }

        /* Mobile panel e tab bar */
        #mobile-panel                   { background: var(--pb); }
        .mob-tab.active                 { color: var(--pa); }

        /* ── Transit bottom sheet ────────────────────────────────────── */
        /* Quando attivo, il pannello occupa solo il 50% inferiore
           lasciando la mappa visibile nella metà superiore dello schermo */
        #mobile-panel.transit-mode {
            height: 52%;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -6px 24px rgba(0,0,0,0.13);
        }
        /* Maniglia visiva in cima al drawer */
        #mobile-panel.transit-mode::before {
            content: '';
            display: block;
            width: 36px;
            height: 4px;
            background: #CCCCCC;
            border-radius: 2px;
            margin: 10px auto 2px;
            flex-shrink: 0;
        }

        /* ── Banner offline ──────────────────────────────────────────── */
        #offline-banner {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1A1A1A;
            color: #FFFFFF;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 16px;
            z-index: 9999;
            border-top: 1px solid #444;
        }

<script>

// ── MOBILE TAB NAVIGATION ─────────────────────────────────────────────────────
let currentMobileTab = 'map';
let mobileCatFilter = 'all';

function mobileTab(tab) {
    if (window.innerWidth > 680) return;
    currentMobileTab = tab;
    const panel = document.getElementById('mobile-panel');

    ['map','places','transit','hotel'].forEach(t => {
        const el = document.getElementById('mob-tab-' + t);
        if (el) el.classList.toggle('active', t === tab);
    });

    if (tab === 'map') {
        panel.classList.remove('open');
        panel.classList.remove('transit-mode');
        // Nascondi marker stazioni quando si torna alla mappa normale
        transitMarkers.forEach(m => { try { if (map.hasLayer(m)) map.removeLayer(m); } catch(e){} });
        return;
    }

    const inner = document.getElementById('mobile-panel-inner');

    if (tab === 'transit') {
        // Bottom sheet: il pannello occupa il 50% inferiore, la mappa resta visibile sopra
        panel.classList.add('transit-mode');
        panel.classList.add('open');
        // Aggiungi marker stazioni sulla mappa (eseguito dopo il layout per sicurezza)
        setTimeout(function() {
            transitMarkers.forEach(function(m) {
                try { if (!map.hasLayer(m)) m.addTo(map); } catch(e) {}
            });
            map.invalidateSize();
        }, 50);
        renderTransit(currentLang);
        inner.innerHTML = document.getElementById('panel-tab-transit').innerHTML;
    } else {
        // Nascondi marker stazioni quando si passa ad altri tab
        transitMarkers.forEach(m => { try { if (map.hasLayer(m)) map.removeLayer(m); } catch(e){} });
        panel.classList.remove('transit-mode');
        panel.classList.add('open');
        if (tab === 'places') {
            renderMobilePlaces();
        } else if (tab === 'hotel') {
            renderHotelInfo(currentLang);
            inner.innerHTML = document.getElementById('panel-tab-hotel').innerHTML;
        }
    }
}

function renderMobilePlaces() {
    const t = T[currentLang];
    const inner = document.getElementById('mobile-panel-inner');
    const cats    = ['all','monument','museum','transport','nature','daytrip'];
    const labels  = [t.all, t.monument, t.museum, t.transport, t.nature, t.daytrip];

    const filterBar = '<div style="display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 12px;position:sticky;top:0;background:var(--cream);z-index:1;border-bottom:1px solid #E0D8CC;margin-bottom:4px">' +
        cats.map((cat, i) => {
            const active = mobileCatFilter === cat;
            return '<button onclick="setMobileFilter(\'' + cat + '\')" style="touch-action:manipulation;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;font-size:0.62rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;border:1px solid ' + (active ? 'var(--gold)' : '#C8BFA8') + ';background:' + (active ? 'var(--gold)' : 'transparent') + ';color:' + (active ? 'white' : 'var(--text-muted)') + ';padding:5px 10px;border-radius:20px;cursor:pointer">' + labels[i] + '</button>';
        }).join('') + '</div>';

    const pois = mobileCatFilter === 'all' ? POI_DATA : POI_DATA.filter(p => p.cat === mobileCatFilter);
    const list = pois.map(poi => {
        const cat = CATEGORIE[poi.cat];
        return '<div onclick="mobilePoi(\'' + poi.id + '\')" style="padding:13px 4px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,0,0,0.06);cursor:pointer">' +
            '<div style="width:10px;height:10px;border-radius:50%;background:' + cat.color + ';flex-shrink:0"></div>' +
            '<div><div style="font-family:Helvetica Neue,Helvetica,Arial,sans-serif;font-size:1rem;font-weight:600;color:var(--dark)">' + (poi.nome[currentLang] || poi.nome.en) + '</div>' +
            '<div style="font-size:0.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase">' + t.catLabel[poi.cat] + '</div></div></div>';
    }).join('');

    inner.innerHTML = filterBar + '<div>' + list + '</div>';
}

function mobilePoi(id) {
    const poi = POI_DATA.find(p => p.id === id);
    if (!poi) return;
    mobileTab('map');
    setTimeout(() => {
        map.setView(poi.coor, 16, {animate:true});
        openDetail(poi);
    }, 350);
}

// ── IMAGE LOADING ─────────────────────────────────────────────────────────────
function loadImage(poi) {
    const imgEl = document.getElementById("detail-img");
    const wrap  = document.getElementById("detail-img-wrap");
    imgEl.classList.remove("loaded");
    imgEl.src = "";
    const oldPh = wrap.querySelector("#detail-img-placeholder");
    if (oldPh) oldPh.remove();

    // imgForce: URL esplicita che bypassa Wikipedia (solo per immagini custom)
    if (poi.imgForce) { applyImg(imgEl, poi.imgForce, wrap, poi); return; }

    const poiName = poi.nome[currentLang] || poi.nome.en;
    const page = WIKI_PAGES[poiName] || WIKI_PAGES[poi.nome.en];

    if (imgCache[poi.id]) { applyImg(imgEl, imgCache[poi.id], wrap, poi); return; }
    if (!page) { poi.img ? applyImg(imgEl, poi.img, wrap, poi) : showFallback(wrap, poi); return; }

    fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(page))
        .then(r => r.json())
        .then(d => {
            const src = (d && d.originalimage && d.originalimage.source) || (d && d.thumbnail && d.thumbnail.source);
            if (src) { imgCache[poi.id] = src; applyImg(imgEl, src, wrap, poi); }
            else if (poi.img) { applyImg(imgEl, poi.img, wrap, poi); }
            else showFallback(wrap, poi);
        })
        .catch(() => poi.img ? applyImg(imgEl, poi.img, wrap, poi) : showFallback(wrap, poi));
}

function applyImg(imgEl, src, wrap, poi) {
    imgEl.onload  = () => imgEl.classList.add("loaded");
    imgEl.onerror = () => showFallback(wrap, poi);
    imgEl.src = src;
}
function showFallback(wrap, poi) {
    const ph = document.createElement("div");
    ph.id = "detail-img-placeholder";
    ph.textContent = poi ? CATEGORIE[poi.cat].emoji : "\u{1F4CD}";
    wrap.appendChild(ph);
}

// ── OPEN DETAIL ───────────────────────────────────────────────────────────────
function openDetail(poi) {
    currentOpenPoi = poi;
    const t  = T[currentLang];
    const cat = CATEGORIE[poi.cat];

    document.getElementById("detail-category").textContent = cat.emoji + "  " + t.catLabel[poi.cat];
    document.getElementById("detail-name").textContent = poi.nome[currentLang] || poi.nome.en;
    document.getElementById("detail-desc").textContent = poi.desc[currentLang] || poi.desc.en;
    loadImage(poi);

    const dist = typeof poi.distanza === "object" ? (poi.distanza[currentLang] || poi.distanza.en) : poi.distanza;
    document.getElementById("detail-meta").innerHTML =
        '<div class="meta-item"><span class="meta-icon">\u{1F4CD}</span><div><span class="meta-label">' + t.fromHotel + '</span><span class="meta-value">' + dist + '</span></div></div>';

    const tc = document.getElementById("detail-ticket");
    if (!poi.sempreAperto && poi.ticketInfo) {
        const ti = poi.ticketInfo;
        const orHtml = ti.orari.map(o => {
            const g = typeof o.giorni === "object" ? (o.giorni[currentLang] || o.giorni.en) : o.giorni;
            const r = typeof o.ore === "object" ? (o.ore[currentLang] || o.ore.en) : o.ore;
            return '<div class="ticket-row"><span class="ticket-row-label">' + g + '</span><span class="ticket-row-value">' + r + '</span></div>';
        }).join("");
        const biHtml = ti.biglietti.map(b => {
            const tipo = typeof b.tipo === "object" ? (b.tipo[currentLang] || b.tipo.en) : b.tipo;
            const isFree = b.prezzo === "Free";
            const prLabel = isFree ? t.free : b.prezzo;
            return '<div class="ticket-row"><span class="ticket-row-label">' + tipo + '</span><span class="ticket-row-value' + (isFree ? " free" : "") + '">' + prLabel + '</span></div>';
        }).join("");
        const noteText = ti.note ? (typeof ti.note === "object" ? (ti.note[currentLang] || ti.note.en) : ti.note) : "";
        tc.innerHTML = '<div class="ticket-box"><div class="ticket-box-title">' + t.ticketTitle + '</div><div class="ticket-section"><div><div class="ticket-col-label">' + t.hours + '</div>' + orHtml + '</div><div><div class="ticket-col-label">' + t.tickets + '</div>' + biHtml + '</div></div>' + (noteText ? '<div class="ticket-note">\u2139\uFE0F ' + noteText + '</div>' : '') + '</div>';
        tc.style.display = "block";
    } else {
        tc.innerHTML = "";
        tc.style.display = "none";
    }

    document.getElementById("dir-label").textContent = t.directions;
    const dest = poi.dirTo || poi.coor;
    document.getElementById("detail-directions").href =
        "https://www.google.com/maps/dir/?api=1&origin=" + HOTEL.coor[0] + "," + HOTEL.coor[1] + "&destination=" + dest[0] + "," + dest[1] + "&travelmode=walking";
    document.getElementById("detail-card").classList.add("open");
}

// ── LANGUAGE SWITCH ───────────────────────────────────────────────────────────
function setLang(lang) {
    currentLang = lang;
    const t = T[lang];

    // Update all lang buttons (panel + mobile)
    document.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === lang);
    });

    // Header subtitle
    document.getElementById("hdr-subtitle").textContent = t.subtitle;
    const mobSub = document.getElementById("mob-subtitle");
    if (mobSub) mobSub.textContent = "Guest Guide";

    // Filter labels
    document.getElementById("f-all").textContent = t.all;
    document.getElementById("f-monument").textContent = t.monument;
    document.getElementById("f-museum").textContent = t.museum;
    document.getElementById("f-transport").textContent = t.transport;
    document.getElementById("f-nature").textContent = t.nature;
    document.getElementById("f-daytrip").textContent = t.daytrip;

    // Hotel popup
    hotelMarker.setPopupContent('<b style="font-family:Helvetica Neue,Helvetica,Arial,sans-serif">Soul Art Hotel</b><br><small style="color:#888">' + t.youAreHere + '</small>');

    // List items
    document.querySelectorAll(".poi-item").forEach(item => {
        const poi = POI_DATA.find(p => p.id === item.dataset.id);
        if (!poi) return;
        item.querySelector(".poi-name").textContent = poi.nome[lang] || poi.nome.en;
        item.querySelector(".poi-cat-label").textContent = t.catLabel[poi.cat];
    });

    // Re-render open card if any
    if (currentOpenPoi) openDetail(currentOpenPoi);

    // Update tab labels
    const tl = TAB_LABELS[lang];
    if (tl) {
        document.getElementById("tab-places-label").textContent = tl.places;
        document.getElementById("tab-transit-label").textContent = tl.transit;
    }

    // Re-render transit if visible
    const transitEl = document.getElementById("panel-tab-transit");
    if (transitEl && transitEl.style.display !== "none") renderTransit(lang);
    const hotelEl = document.getElementById("panel-tab-hotel");
    if (hotelEl && hotelEl.style.display !== "none") renderHotelInfo(lang);

    // Update mobile tab labels
    const ml = MOBILE_TAB_LABELS[lang] || MOBILE_TAB_LABELS.en;
    ['map','places','transit','hotel'].forEach(t => {
        const el = document.getElementById('mobt-' + t);
        if (el) el.textContent = ml[t];
    });
    // Re-render mobile panel if open
    if (currentMobileTab !== 'map') mobileTab(currentMobileTab);

    // Aggiorna testo banner offline nella nuova lingua
    if (typeof window._updateOfflineBanner === 'function') window._updateOfflineBanner();
}

function renderTransit(lang) {
    const tu = TRANSIT_UI[lang] || TRANSIT_UI.en;
    let html = '';

    // Helper to render a group of lines
    function renderGroup(sectionTitle, lines) {
        html += '<div class="transit-section"><div class="transit-section-title">' + sectionTitle + '</div>';
        lines.forEach(l => {
            html += '<div class="transit-line">';
            html += '<div class="transit-line-header">';
            html += '<span class="transit-badge" style="background:' + l.color + ';border-radius:6px;font-size:0.58rem">' + l.icon + '</span>';
            html += '<div><div class="transit-line-name">' + (l.name[lang]||l.name.en) + '</div>';
            html += '<div class="transit-line-sub">' + (l.sub[lang]||l.sub.en) + '</div></div></div>';
            html += '<div class="transit-hours">';
            html += '<div class="transit-hour-item"><span class="transit-hour-label">' + tu.first + '</span><span class="transit-hour-value">' + l.first + '</span></div>';
            html += '<div class="transit-hour-item"><span class="transit-hour-label">' + tu.last + '</span><span class="transit-hour-value">' + l.last + '</span></div>';
            html += '</div>';
            html += '<div class="transit-freq">' + (l.freq[lang]||l.freq.en) + '</div>';
            if (l.closureNote) html += '<div style="font-size:0.7rem;font-weight:600;color:#b71c1c;background:#fdecea;border-left:3px solid #b71c1c;border-radius:4px;padding:5px 8px;margin-top:7px">\u26A0\uFE0F ' + (l.closureNote[lang]||l.closureNote.en) + '</div>';
            if (l.note) html += '<div style="font-size:0.65rem;color:#888;margin-top:5px;font-style:italic">\u2139\uFE0F ' + (l.note[lang]||l.note.en) + '</div>';
            // Fermate con link Google Maps
            const lineStops = TRANSIT_STATIONS.filter(s => s.type === l.icon);
            if (lineStops.length) {
                html += '<div style="margin-top:9px;border-top:1px solid rgba(0,0,0,0.07);padding-top:7px">';
                lineStops.forEach(stop => {
                    const gmUrl = 'https://www.google.com/maps/dir/?api=1&origin=' + HOTEL.coor[0] + ',' + HOTEL.coor[1] + '&destination=' + stop.coor[0] + ',' + stop.coor[1] + '&travelmode=walking';
                    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0">';
                    html += '<span style="font-size:0.78rem;color:var(--dark)">' + stop.label + '</span>';
                    html += '<a href="' + gmUrl + '" target="_blank" style="font-size:0.62rem;color:#4285F4;text-decoration:none;background:#EAF1FF;padding:2px 8px;border-radius:10px;flex-shrink:0;margin-left:8px">\uD83E\uDDED</a>';
                    html += '</div>';
                });
                html += '</div>';
            }
            html += '</div>';
        });
        html += '</div>';
    }

    renderGroup('<span class="transit-badge" style="background:#E53935;margin-right:4px">M</span>' + tu.metro, TRANSIT.metro.lines);
    html += '<div class="transit-divider"></div>';
    renderGroup('<span class="transit-badge" style="background:#1565C0;margin-right:4px">F</span>' + tu.funicolare, TRANSIT.funicolare.lines);
    html += '<div class="transit-tip"><strong>' + tu.tipTitle + '</strong>' + tu.tip + '</div>';

    document.getElementById("panel-tab-transit").innerHTML = html;
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(tab) {
    const isPlaces  = (tab === 'places');
    const isTransit = (tab === 'transit');
    const isHotel   = (tab === 'hotel');
    document.getElementById('tab-places').classList.toggle('active', isPlaces);
    document.getElementById('tab-transit').classList.toggle('active', isTransit);
    document.getElementById('tab-hotel').classList.toggle('active', isHotel);
    document.getElementById('panel-tab-places').style.display  = isPlaces  ? 'flex'  : 'none';
    document.getElementById('panel-tab-transit').style.display = isTransit ? 'block' : 'none';
    document.getElementById('panel-tab-hotel').style.display   = isHotel   ? 'block' : 'none';
    if (isTransit) renderTransit(currentLang);
    if (isHotel)   renderHotelInfo(currentLang);
    if (typeof transitMarkers !== 'undefined') {
        transitMarkers.forEach(m => {
            if (isTransit) { if (!map.hasLayer(m)) m.addTo(map); }
            else { if (map.hasLayer(m)) map.removeLayer(m); }
        });
    }
}
