[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# HTML: sempre rivalidato (garantisce aggiornamenti immediati)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# Service Worker: MAI in cache (il browser deve sempre leggerlo fresco)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS e CSS: cache lunga (il SW gestisce gli aggiornamenti via CACHE_VERSION)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Immagini: cache lunga
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Manifest PWA: rivalidato ogni ora
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
